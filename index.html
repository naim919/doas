<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doas y Desistimientos · EVVO</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root {
    --bg:          #f2ede4;
    --bg2:         #ebe4d8;
    --surface:     #faf7f2;
    --border:      #ddd5c4;
    --border2:     #ccc2ae;
    --text:        #2a2118;
    --text2:       #6b5f50;
    --muted:       #a09282;
    --ok:          #2d7a56;
    --ok-bg:       #e8f5ee;
    --ok-border:   #b8dfc9;
    --ok-light:    #f0faf4;
    --late:        #b8382a;
    --late-bg:     #faecea;
    --late-border: #f0bdb8;
    --late-light:  #fdf5f4;
    --rec:         #2460a7;
    --rec-bg:      #e8f0fa;
    --rec-border:  #b8cff0;
    --rec-light:   #f0f5fd;
    --accent:      #c17f3a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 2.5rem;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(193,127,58,.08) 0%, transparent 60%),
      radial-gradient(ellipse at 90% 100%, rgba(45,122,86,.06) 0%, transparent 60%);
  }

  .header {
    display:flex; align-items:flex-start; justify-content:space-between;
    margin-bottom:2rem; padding-bottom:1.5rem;
    border-bottom:1.5px solid var(--border);
  }
  .brand { display:flex; align-items:center; gap:14px; }
  .brand-logo {
    width:44px; height:44px; background:var(--accent); border-radius:10px;
    display:flex; align-items:center; justify-content:center;
    font-family:'Playfair Display',serif; font-weight:700; font-size:15px;
    color:#fff; box-shadow:0 2px 8px rgba(193,127,58,.25);
  }
  .brand-text h1 { font-family:'Playfair Display',serif; font-size:22px; font-weight:700; letter-spacing:-.3px; }
  .brand-text p  { font-size:12px; color:var(--muted); font-family:'DM Mono',monospace; margin-top:2px; }
  .header-right  { display:flex; flex-direction:column; align-items:flex-end; gap:10px; }
  .header-meta   { text-align:right; font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); line-height:1.9; }
  .live-dot      { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--ok); margin-right:5px; animation:pulse 2.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .header-actions { display:flex; gap:8px; }

  .btn {
    display:inline-flex; align-items:center; gap:6px;
    font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500;
    padding:7px 14px; border-radius:8px; cursor:pointer;
    transition:all .18s; border:1.5px solid transparent; white-space:nowrap;
  }
  .btn-refresh      { background:var(--surface); border-color:var(--border2); color:var(--text2); }
  .btn-refresh:hover{ background:var(--bg2); }
  .btn-export-all   { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 2px 8px rgba(193,127,58,.2); }
  .btn-export-all:hover { filter:brightness(1.08); }
  .btn-export-sm    { background:var(--surface); border-color:var(--border); color:var(--text2); font-size:11px; padding:5px 10px; border-radius:6px; }
  .btn-export-sm:hover  { background:var(--bg2); }

  .loading-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:350px; gap:16px; }
  .spinner { width:34px; height:34px; border:2.5px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin .75s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
  .loading-text { font-family:'DM Mono',monospace; font-size:12px; color:var(--muted); }
  .error-box { background:var(--late-light); border:1.5px solid var(--late-border); border-radius:12px; padding:1.5rem 2rem; color:var(--late); font-family:'DM Mono',monospace; font-size:13px; line-height:1.8; }

  .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:1.75rem; }
  .stat { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:1.25rem 1.5rem; position:relative; overflow:hidden; animation:fadeUp .4s ease both; }
  .stat:nth-child(1){animation-delay:.05s} .stat:nth-child(2){animation-delay:.1s}
  .stat:nth-child(3){animation-delay:.15s} .stat:nth-child(4){animation-delay:.2s}
  @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
  .stat::after { content:''; position:absolute; bottom:0; left:0; right:0; height:3px; border-radius:0 0 14px 14px; }
  .stat-total::after{background:var(--accent)} .stat-ok::after{background:var(--ok)}
  .stat-late::after{background:var(--late)}    .stat-rec::after{background:var(--rec)}
  .stat-label { font-size:11px; font-family:'DM Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:.7px; margin-bottom:.6rem; }
  .stat-val   { font-family:'Playfair Display',serif; font-size:44px; font-weight:700; line-height:1; letter-spacing:-1px; }
  .stat-total .stat-val{color:var(--text)} .stat-ok .stat-val{color:var(--ok)}
  .stat-late  .stat-val{color:var(--late)} .stat-rec .stat-val{color:var(--rec)}
  .stat-sub   { font-size:11px; color:var(--muted); margin-top:.5rem; font-family:'DM Mono',monospace; }

  .progress-section { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; padding:1.25rem 1.5rem; margin-bottom:1.75rem; animation:fadeUp .4s .25s ease both; }
  .progress-label { display:flex; justify-content:space-between; font-size:12px; margin-bottom:10px; color:var(--text2); }
  .progress-label span:last-child { font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); }
  .progress-track { height:8px; background:var(--bg2); border-radius:99px; overflow:hidden; display:flex; gap:3px; }
  .progress-ok  { background:var(--ok);   border-radius:99px; transition:width 1s ease; }
  .progress-late{ background:var(--late); border-radius:99px; transition:width 1s ease; }
  .progress-rec { background:var(--rec);  border-radius:99px; transition:width 1s ease; }
  .progress-legend { display:flex; gap:1.5rem; margin-top:10px; flex-wrap:wrap; }
  .legend-item { display:flex; align-items:center; gap:6px; font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; }
  .legend-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  .tables-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
  .table-full  { grid-column:1/-1; }
  .panel { background:var(--surface); border:1.5px solid var(--border); border-radius:14px; overflow:hidden; animation:fadeUp .4s ease both; }
  .panel-ok  { animation-delay:.3s; }
  .panel-late{ animation-delay:.35s; }
  .panel-rec { animation-delay:.4s; }
  .panel-head { padding:.875rem 1.25rem; border-bottom:1.5px solid var(--border); display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  .panel-ok   .panel-head { background:var(--ok-light); }
  .panel-late .panel-head { background:var(--late-light); }
  .panel-rec  .panel-head { background:var(--rec-light); }
  .panel-icon  { width:28px; height:28px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
  .icon-ok  { background:var(--ok-bg); }
  .icon-late{ background:var(--late-bg); }
  .icon-rec { background:var(--rec-bg); }
  .panel-title { flex:1; font-size:13px; font-weight:600; color:var(--text); min-width:0; }
  .panel-badge { font-size:10px; font-family:'DM Mono',monospace; padding:3px 9px; border-radius:99px; font-weight:500; }
  .badge-ok  { background:var(--ok-bg);   color:var(--ok);   border:1px solid var(--ok-border); }
  .badge-late{ background:var(--late-bg); color:var(--late); border:1px solid var(--late-border); }
  .badge-rec { background:var(--rec-bg);  color:var(--rec);  border:1px solid var(--rec-border); }
  .count-pill{ font-size:12px; font-family:'DM Mono',monospace; font-weight:500; background:var(--bg); border:1.5px solid var(--border); border-radius:99px; padding:2px 10px; color:var(--text2); }

  table      { width:100%; border-collapse:collapse; font-size:13px; }
  thead th   { padding:9px 1.25rem; text-align:left; font-size:10px; font-family:'DM Mono',monospace; color:var(--muted); text-transform:uppercase; letter-spacing:.6px; background:var(--bg2); border-bottom:1.5px solid var(--border); font-weight:400; }
  tbody td   { padding:11px 1.25rem; border-bottom:1px solid var(--border); vertical-align:middle; }
  tbody tr:last-child td { border-bottom:none; }
  tbody tr   { transition:background .12s; }
  tbody tr:hover td { background:var(--bg2); }

  .num-pedido { font-family:'DM Mono',monospace; font-weight:500; color:var(--accent); font-size:12px; }
  .nombre     { font-weight:600; font-size:13px; }
  .fecha      { font-family:'DM Mono',monospace; font-size:12px; color:var(--text2); }
  .dias-chip  { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:99px; font-size:11px; font-family:'DM Mono',monospace; font-weight:500; }
  .dias-ok  { background:var(--ok-bg);   color:var(--ok);   border:1px solid var(--ok-border); }
  .dias-late{ background:var(--late-bg); color:var(--late); border:1px solid var(--late-border); }
  .dias-rec { background:var(--rec-bg);  color:var(--rec);  border:1px solid var(--rec-border); }
  .bar-wrap  { display:flex; align-items:center; gap:8px; }
  .bar-track { flex:1; height:4px; background:var(--bg2); border-radius:99px; overflow:hidden; max-width:55px; }
  .bar-fill  { height:100%; border-radius:99px; }
  .empty-state { padding:2rem 1.25rem; text-align:center; color:var(--muted); font-family:'DM Mono',monospace; font-size:12px; }
  .footer { margin-top:2rem; display:flex; justify-content:space-between; align-items:center; font-family:'DM Mono',monospace; font-size:11px; color:var(--muted); border-top:1.5px solid var(--border); padding-top:1rem; }
</style>
</head>
<body>

<div class="header">
  <div class="brand">
    <div class="brand-logo">EV</div>
    <div class="brand-text">
      <h1>Doas y Desistimientos</h1>
      <p>EVVO · Control de revisiones</p>
    </div>
  </div>
  <div class="header-right">
    <div class="header-meta">
      <div><span class="live-dot"></span>Conectado a Airtable</div>
      <div id="fecha-hoy"></div>
    </div>
    <div class="header-actions">
      <button class="btn btn-refresh" onclick="cargar()">↻ Actualizar</button>
      <button class="btn btn-export-all" onclick="exportarTodo()">⬇ Exportar todo a XLS</button>
    </div>
  </div>
</div>

<div id="main-content">
  <div class="loading-screen">
    <div class="spinner"></div>
    <div class="loading-text">Cargando desde Airtable...</div>
  </div>
</div>

<div class="footer">
  <span>Airtable · Clúster Productos EVVO · Doas y desistimientos</span>
  <span id="ts-footer"></span>
</div>

<script>
const TOKEN    = 'patF6gwn1S9Gux0ou.6c56e7a064b488dd8274519fae1e25bd230d97976b29fac3eaab60e8e0bfdd17';
const BASE_ID  = 'appgkdOZMlGsT4LgE';
// Usamos el nombre de la tabla directamente — la API REST acepta nombres
const TABLE    = 'Doas%20y%20desistimientos';

// Estado global para exportación
let state = { enPlazo:[], conRetraso:[], recientes:[], total:0 };

function diasHabiles(d1, d2) {
  let n=0, cur=new Date(d1+'T00:00:00'), end=new Date(d2+'T00:00:00');
  while(cur<=end){ const d=cur.getDay(); if(d&&d<6)n++; cur.setDate(cur.getDate()+1); }
  return n;
}

function fmt(s) {
  if(!s) return '—';
  const [y,m,d]=s.split('-'); return `${d}/${m}/${y}`;
}

async function fetchAirtable() {
  let records=[], offset=null;
  // Pedimos por nombre de campo — más robusto que field IDs
  const fields = [
    'fields[]=N%C3%BAmero%20Pedido',
    'fields[]=Nombre%20del%20Cliente',
    'fields[]=Fecha%20Recepci%C3%B3n',
    'fields[]=Fecha%20Revisi%C3%B3n'
  ].join('&');

  do {
    const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE}?${fields}&pageSize=100${offset?'&offset='+offset:''}`;
    const res  = await fetch(url, { headers:{ Authorization:`Bearer ${TOKEN}` }});
    if(!res.ok) {
      const err = await res.json().catch(()=>({}));
      throw new Error(err.error?.message || `HTTP ${res.status}`);
    }
    const data = await res.json();
    records = records.concat(data.records||[]);
    offset  = data.offset||null;
  } while(offset);
  return records;
}

// ─── EXPORTACIÓN ────────────────────────────────────────────────────────────
function toExcelRows(rows, tipo) {
  if(tipo==='recientes') return rows.map(r=>({
    'Nº Pedido':       r.pedido,
    'Cliente':         r.cliente,
    'Fecha Recepción': fmt(r.recepcion),
    'Fecha Revisión':  fmt(r.revision),
    'Días Hábiles':    r.dias
  }));
  return rows.map(r=>({
    'Nº Pedido':       r.pedido,
    'Cliente':         r.cliente,
    'Fecha Recepción': fmt(r.recepcion),
    'Días Hábiles':    r.dias
  }));
}

function exportarTabla(tipo) {
  const map = { plazo:['enPlazo','En Plazo'], retraso:['conRetraso','Con Retraso'], recientes:['recientes','Recientes'] };
  const [key, nombre] = map[tipo];
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.json_to_sheet(toExcelRows(state[key], tipo));
  ws['!cols'] = [{wch:12},{wch:24},{wch:18},{wch:18},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws, nombre);
  XLSX.writeFile(wb, `EVVO_Doas_${nombre.replace(' ','_')}_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function exportarTodo() {
  const wb   = XLSX.utils.book_new();
  const fecha= new Date().toISOString().slice(0,10);
  [
    ['enPlazo','En Plazo','plazo'],
    ['conRetraso','Con Retraso','retraso'],
    ['recientes','Recientes','recientes']
  ].forEach(([key,nombre,tipo])=>{
    const rows = state[key].length ? toExcelRows(state[key],tipo) : [{'Sin registros':''}];
    const ws   = XLSX.utils.json_to_sheet(rows);
    ws['!cols']= [{wch:12},{wch:24},{wch:18},{wch:18},{wch:14}];
    XLSX.utils.book_append_sheet(wb, ws, nombre);
  });
  const wsRes = XLSX.utils.json_to_sheet([
    {'Categoría':'Total pedidos',        'Cantidad':state.total},
    {'Categoría':'En plazo',             'Cantidad':state.enPlazo.length},
    {'Categoría':'Con retraso',          'Cantidad':state.conRetraso.length},
    {'Categoría':'Revisiones recientes', 'Cantidad':state.recientes.length},
    {'Categoría':'Fecha exportación',    'Cantidad':fecha},
  ]);
  wsRes['!cols']=[{wch:28},{wch:16}];
  XLSX.utils.book_append_sheet(wb, wsRes, 'Resumen');
  XLSX.writeFile(wb, `EVVO_Doas_Completo_${fecha}.xlsx`);
}

// ─── RENDER ─────────────────────────────────────────────────────────────────
function rowsOkLate(rows, chipClass, barColor, maxDias) {
  if(!rows.length) return '<tr><td colspan="4" class="empty-state">Sin registros</td></tr>';
  return rows.map(r=>`
    <tr>
      <td><span class="num-pedido">#${r.pedido}</span></td>
      <td><span class="nombre">${r.cliente}</span></td>
      <td><span class="fecha">${fmt(r.recepcion)}</span></td>
      <td>
        <div class="bar-wrap">
          <span class="dias-chip ${chipClass}">${r.dias}d</span>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.min(100,Math.round(r.dias/maxDias*100))}%;background:${barColor}"></div></div>
        </div>
      </td>
    </tr>`).join('');
}

function rowsRec(rows) {
  if(!rows.length) return '<tr><td colspan="5" class="empty-state">Sin revisiones recientes</td></tr>';
  return rows.map(r=>`
    <tr>
      <td><span class="num-pedido">#${r.pedido}</span></td>
      <td><span class="nombre">${r.cliente}</span></td>
      <td><span class="fecha">${fmt(r.recepcion)}</span></td>
      <td><span class="fecha" style="color:var(--rec);font-weight:500">${fmt(r.revision)}</span></td>
      <td><span class="dias-chip dias-rec">${r.dias}d</span></td>
    </tr>`).join('');
}

function render(registros) {
  const hoy    = new Date(); hoy.setHours(0,0,0,0);
  const hoyStr = hoy.toISOString().slice(0,10);
  const ayerStr= new Date(hoy.getTime()-86400000).toISOString().slice(0,10);

  document.getElementById('fecha-hoy').textContent =
    hoy.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('ts-footer').textContent =
    'Actualizado: '+new Date().toLocaleTimeString('es-ES');

  const enPlazo=[], conRetraso=[], recientes=[];

  registros.forEach(r=>{
    const f        = r.fields || {};
    const pedido   = f['Número Pedido']      || '—';
    const cliente  = f['Nombre del Cliente'] || '—';
    const recep    = f['Fecha Recepción']    || null;
    const revision = f['Fecha Revisión']     || null;

    if(!recep) return;

    if(!revision) {
      const d = diasHabiles(recep, hoyStr);
      (d<=5 ? enPlazo : conRetraso).push({pedido,cliente,recepcion:recep,revision:null,dias:d});
    } else if(revision===hoyStr || revision===ayerStr) {
      recientes.push({pedido,cliente,recepcion:recep,revision,dias:diasHabiles(recep,revision)});
    }
  });

  state = { enPlazo, conRetraso, recientes, total:registros.length };

  const total  = registros.length;
  const maxDias= Math.max(...[...enPlazo,...conRetraso,...recientes].map(r=>r.dias),1);
  const pOk    = total ? Math.round(enPlazo.length/total*100)    : 0;
  const pLate  = total ? Math.round(conRetraso.length/total*100) : 0;
  const pRec   = total ? Math.round(recientes.length/total*100)  : 0;

  document.getElementById('main-content').innerHTML = `
    <div class="stats">
      <div class="stat stat-total">
        <div class="stat-label">Total pedidos</div>
        <div class="stat-val">${total}</div>
        <div class="stat-sub">en seguimiento</div>
      </div>
      <div class="stat stat-ok">
        <div class="stat-label">En plazo</div>
        <div class="stat-val">${enPlazo.length}</div>
        <div class="stat-sub">≤ 5 días hábiles</div>
      </div>
      <div class="stat stat-late">
        <div class="stat-label">Con retraso</div>
        <div class="stat-val">${conRetraso.length}</div>
        <div class="stat-sub">> 5 días hábiles</div>
      </div>
      <div class="stat stat-rec">
        <div class="stat-label">Recientes</div>
        <div class="stat-val">${recientes.length}</div>
        <div class="stat-sub">hoy o ayer</div>
      </div>
    </div>

    <div class="progress-section">
      <div class="progress-label">
        <span style="font-weight:500">Distribución del estado de revisiones</span>
        <span>${pOk}% en plazo · ${pLate}% retraso · ${pRec}% recientes</span>
      </div>
      <div class="progress-track">
        <div class="progress-ok"   id="bar-ok"   style="width:0%"></div>
        <div class="progress-late" id="bar-late" style="width:0%"></div>
        <div class="progress-rec"  id="bar-rec"  style="width:0%"></div>
      </div>
      <div class="progress-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--ok)"></div>En plazo</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--late)"></div>Con retraso</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--rec)"></div>Revisados hoy/ayer</div>
      </div>
    </div>

    <div class="tables-grid">

      <div class="panel panel-ok">
        <div class="panel-head">
          <div class="panel-icon icon-ok">🟢</div>
          <div class="panel-title">Pendientes en plazo</div>
          <span class="panel-badge badge-ok">≤ 5 días hábiles</span>
          <span class="count-pill">${enPlazo.length}</span>
          <button class="btn btn-export-sm" onclick="exportarTabla('plazo')">⬇ XLS</button>
        </div>
        <table>
          <thead><tr><th>Pedido</th><th>Cliente</th><th>Recepción</th><th>Días</th></tr></thead>
          <tbody>${rowsOkLate(enPlazo,'dias-ok','var(--ok)',maxDias)}</tbody>
        </table>
      </div>

      <div class="panel panel-late">
        <div class="panel-head">
          <div class="panel-icon icon-late">🔴</div>
          <div class="panel-title">Revisiones con retraso</div>
          <span class="panel-badge badge-late">> 5 días hábiles</span>
          <span class="count-pill">${conRetraso.length}</span>
          <button class="btn btn-export-sm" onclick="exportarTabla('retraso')">⬇ XLS</button>
        </div>
        <table>
          <thead><tr><th>Pedido</th><th>Cliente</th><th>Recepción</th><th>Días</th></tr></thead>
          <tbody>${rowsOkLate(conRetraso,'dias-late','var(--late)',maxDias)}</tbody>
        </table>
      </div>

      <div class="panel panel-rec table-full">
        <div class="panel-head">
          <div class="panel-icon icon-rec">🔵</div>
          <div class="panel-title">Revisiones recientes</div>
          <span class="panel-badge badge-rec">Hoy o ayer</span>
          <span class="count-pill">${recientes.length}</span>
          <button class="btn btn-export-sm" onclick="exportarTabla('recientes')">⬇ XLS</button>
        </div>
        <table>
          <thead><tr><th>Pedido</th><th>Cliente</th><th>Recepción</th><th>Fecha revisión</th><th>Días hábiles</th></tr></thead>
          <tbody>${rowsRec(recientes)}</tbody>
        </table>
      </div>

    </div>`;

  setTimeout(()=>{
    const bo=document.getElementById('bar-ok');
    const bl=document.getElementById('bar-late');
    const br=document.getElementById('bar-rec');
    if(bo) bo.style.width=pOk+'%';
    if(bl) bl.style.width=pLate+'%';
    if(br) br.style.width=pRec+'%';
  },100);
}

async function cargar() {
  document.getElementById('main-content').innerHTML=`
    <div class="loading-screen">
      <div class="spinner"></div>
      <div class="loading-text">Cargando desde Airtable...</div>
    </div>`;
  try {
    const records = await fetchAirtable();
    render(records);
  } catch(e) {
    document.getElementById('main-content').innerHTML=`
      <div class="error-box">
        Error al conectar con Airtable:<br><br>${e.message}<br><br>
        Verifica el token en airtable.com/create/tokens
      </div>`;
  }
}

cargar();
</script>
</body>
</html>
